<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- Decorative corner accents -->
  <path d="M0,16 Q0,0 16,0 L80,0" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M0,16 L0,80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M1120,0 L1184,0 Q1200,0 1200,16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M1200,16 L1200,80" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <path d="M0,304 Q0,320 16,320 L80,320" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <path d="M0,240 L0,304" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <path d="M1120,320 L1184,320 Q1200,320 1200,304" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <path d="M1200,240 L1200,304" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- Mall icon: shield with checkmark — curated, quality-gated -->
  <g transform="translate(120, 160)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M0,-65 L55,-42 L55,12 Q55,52 0,70 Q-55,52 -55,12 L-55,-42 Z" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round" opacity="0.85"/>
    <!-- Inner shield -->
    <path d="M0,-48 L40,-30 L40,6 Q40,38 0,50 Q-40,38 -40,6 L-40,-30 Z" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.3"/>
    <!-- Checkmark -->
    <path d="M-18,6 L-6,18 L22,-12" fill="none" stroke="url(#goldAccent)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Subtle category bands -->
    <line x1="-35" y1="-18" x2="35" y2="-18" stroke="#94a3b8" stroke-width="0.8" opacity="0.15"/>
    <line x1="-28" y1="30" x2="28" y2="30" stroke="#94a3b8" stroke-width="0.8" opacity="0.15"/>
    <!-- Corner accents -->
    <circle cx="-50" cy="-35" r="2.5" fill="#38bdf8" opacity="0.5"/>
    <circle cx="50" cy="-35" r="2.5" fill="#c084fc" opacity="0.5"/>
    <circle cx="-35" cy="45" r="2" fill="#34d399" opacity="0.4"/>
    <circle cx="35" cy="45" r="2" fill="#fbbf24" opacity="0.4"/>
    <!-- Sparkle top-right -->
    <g transform="translate(60, -55)" opacity="0.8">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="url(#goldAccent)" stroke-width="2" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="url(#goldAccent)" stroke-width="2" stroke-linecap="round"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="url(#goldAccent)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="url(#goldAccent)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Small sparkle top-left -->
    <g transform="translate(-55, -50)" opacity="0.45">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Title -->
  <text x="230" y="110" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#f8fafc" letter-spacing="-1">Alex Skill Mall</text>

  <!-- Tagline -->
  <text x="230" y="148" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#94a3b8" font-weight="400">Curated skills for any AI-assisted project</text>

  <!-- Accent line -->
  <rect x="230" y="164" width="120" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Stats badges -->
  <g transform="translate(230, 190)">
    <!-- Skills badge -->
    <rect x="0" y="0" width="110" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="18" r="6" fill="#38bdf8" opacity="0.8"/>
    <text x="34" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">303 skills</text>

    <!-- Categories badge -->
    <rect x="124" y="0" width="130" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="144" cy="18" r="6" fill="#818cf8" opacity="0.8"/>
    <text x="158" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">35 categories</text>

    <!-- Curated badge -->
    <rect x="268" y="0" width="164" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="288" cy="18" r="6" fill="#c084fc" opacity="0.8"/>
    <text x="302" y="23" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">ACT Edition v1.0</text>
  </g>

  <!-- Bottom tagline -->
  <text x="230" y="268" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#64748b">Drop a skill into <tspan fill="#94a3b8" font-family="Consolas, monospace">.github/skills/</tspan> and your AI assistant learns it instantly</text>

  <!-- Right side: value proposition cards -->
  <g transform="translate(790, 35)">
    <rect x="0" y="0" width="240" height="38" rx="8" fill="#38bdf8" opacity="0.2"/>
    <rect x="0" y="0" width="240" height="38" rx="8" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <text x="16" y="24" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#7dd3fc">Code, cloud, and security</text>

    <rect x="30" y="50" width="260" height="38" rx="8" fill="#818cf8" opacity="0.2"/>
    <rect x="30" y="50" width="260" height="38" rx="8" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
    <text x="46" y="74" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc">Healthcare, legal, and finance</text>

    <rect x="10" y="100" width="270" height="38" rx="8" fill="#c084fc" opacity="0.2"/>
    <rect x="10" y="100" width="270" height="38" rx="8" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
    <text x="26" y="124" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#d8b4fe">Data, research, and publishing</text>

    <rect x="40" y="150" width="250" height="38" rx="8" fill="#fbbf24" opacity="0.15"/>
    <rect x="40" y="150" width="250" height="38" rx="8" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
    <text x="56" y="174" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#fcd34d">Critical thinking built in</text>

    <rect x="20" y="200" width="230" height="38" rx="8" fill="#34d399" opacity="0.2"/>
    <rect x="20" y="200" width="230" height="38" rx="8" fill="none" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <text x="36" y="224" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#6ee7b7">Fleet governance at scale</text>
  </g>

  <!-- Version pill bottom-right -->
  <rect x="1070" y="280" width="100" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1120" y="296" font-family="Consolas, monospace" font-size="11" fill="#94a3b8" text-anchor="middle">v1.0.0</text>
</svg>
